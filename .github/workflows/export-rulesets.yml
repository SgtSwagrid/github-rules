name: Export rulesets

on:
  workflow_dispatch:

# Cancel in-progress runs when starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-rulesets:
    name: Export rulesets
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Require GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_TOKEN secret is not set. Create a GitHub Personal Access Token and add it as a repository secret named GH_TOKEN."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash scripts/export-rulesets.sh

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/rulesets/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "[ci]: Exported GitHub rulesets to source. [skip ci]"
            git push
          fi
