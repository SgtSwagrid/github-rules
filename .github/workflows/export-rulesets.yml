name: Export rulesets

on:
  workflow_dispatch:

# Cancel in-progress runs when starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-rulesets:
    name: Export rulesets
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Require GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_TOKEN secret is not set. Create a GitHub Personal Access Token and add it as a repository secret named GH_TOKEN."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash scripts/export-rulesets.sh

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_TITLE: "chore: export GitHub rulesets"
          BASE_BRANCH: ${{ github.ref_name }}
          UPDATE_BRANCH: ci/export-rulesets
        run: bash scripts/open-pr.sh
