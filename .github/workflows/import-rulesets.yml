name: Import rulesets

on:
  push:
    branches:
      - $default-branch
    paths:
      - .github/rulesets/**
  workflow_dispatch:

# Cancel in-progress runs when starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-rulesets:
    name: Import rulesets
    runs-on: ubuntu-latest

    steps:
      - name: Require GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_TOKEN secret is not set. Create a GitHub Personal Access Token and add it as a repository secret named GH_TOKEN."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash scripts/clear-rulesets.sh

      - name: Sync
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash scripts/import-rulesets.sh
